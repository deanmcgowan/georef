name: Georeference Input Maps

on:
  push:
    branches:
      - main
    paths:
      - 'input/**'
  workflow_dispatch:
    inputs:
      process_all:
        description: 'Process all images (true) or only changed (false)'
        type: boolean
        default: false
      specific_images:
        description: 'Comma-separated list of specific images to process (optional)'
        type: string
        default: ''

permissions:
  contents: write

jobs:
  georeference:
    runs-on: ubuntu-latest
    # Do not run on georeference/* result branches (avoids re-trigger loops)
    if: >
      !startsWith(github.ref, 'refs/heads/georeference/')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            tesseract-ocr \
            tesseract-ocr-swe \
            libgdal-dev

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Determine images to process
        id: changed
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SPECIFIC="${{ github.event.inputs.specific_images }}"
            PROCESS_ALL="${{ github.event.inputs.process_all }}"

            if [ -n "$SPECIFIC" ]; then
              # Parse comma-separated list into space-separated image names
              IMAGES=$(echo "$SPECIFIC" | tr ',' ' ' | xargs -n1 | \
                while read img; do
                  # Strip surrounding whitespace and resolve to input/ path
                  img=$(echo "$img" | xargs)
                  if [ -f "input/$img" ]; then
                    echo "input/$img"
                  elif [ -f "$img" ]; then
                    echo "$img"
                  else
                    echo "WARNING: image not found: $img" >&2
                  fi
                done | tr '\n' ' ')
            elif [ "$PROCESS_ALL" = "true" ]; then
              IMAGES=$(find input/ -maxdepth 1 \
                -type f \( -iname '*.jpg' -o -iname '*.jpeg' \
                           -o -iname '*.png' -o -iname '*.tif' \
                           -o -iname '*.tiff' \) | tr '\n' ' ')
            else
              IMAGES=""
            fi
          else
            # Push event: detect changed files in input/
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              # First push — process all images
              IMAGES=$(find input/ -maxdepth 1 \
                -type f \( -iname '*.jpg' -o -iname '*.jpeg' \
                           -o -iname '*.png' -o -iname '*.tif' \
                           -o -iname '*.tiff' \) | tr '\n' ' ')
            else
              IMAGES=$(git diff --name-only "$BEFORE" "$SHA" \
                | grep '^input/' \
                | grep -iE '\.(jpg|jpeg|png|tif|tiff)$' \
                | tr '\n' ' ')
            fi
          fi

          echo "images=$IMAGES" >> "$GITHUB_OUTPUT"
          if [ -n "$IMAGES" ]; then
            echo "has_images=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_images=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Images to process: $IMAGES"

      - name: Skip if no images changed
        if: steps.changed.outputs.has_images == 'false'
        run: |
          echo "No supported images to process. Exiting."
          exit 0

      - name: Create result branch
        if: steps.changed.outputs.has_images == 'true'
        id: branch
        run: |
          BRANCH="georeference/$(date -u +%Y%m%d-%H%M)-run${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Process images
        if: steps.changed.outputs.has_images == 'true'
        env:
          LANTMATERIET_USERNAME: ${{ secrets.LANTMATERIET_USERNAME }}
          LANTMATERIET_PASSWORD: ${{ secrets.LANTMATERIET_PASSWORD }}
        run: |
          python3 scripts/process_input_batch.py \
            --images ${{ steps.changed.outputs.images }} \
            --review-dir review/ \
            --reports-dir reports/ \
            --output-summary reports/summary.json

      - name: Commit outputs
        if: steps.changed.outputs.has_images == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add review/ reports/
          git diff --cached --quiet || \
            git commit -m "georeference: process batch [skip ci]"

      - name: Push result branch
        if: steps.changed.outputs.has_images == 'true'
        run: git push origin "${{ steps.branch.outputs.branch }}"

      - name: Write job summary
        if: always() && steps.changed.outputs.has_images == 'true'
        run: |
          echo "## Georeferencing Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/summary.json ]; then
            python3 - << 'EOF'
          import sys, json, os
          summary_path = "reports/summary.json"
          if not os.path.exists(summary_path):
              print("No summary found.")
              sys.exit(0)
          with open(summary_path) as f:
              d = json.load(f)
          lines = []
          for r in d.get("results", []):
              rms = f"{r['rms']:.3f}" if r.get("rms") is not None else "N/A"
              lines.append(
                  f"| {r['image']} | {r.get('quality','N/A')} "
                  f"| {rms} | {r.get('status','N/A')} |"
              )
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write("| Image | Quality | RMS (m) | Status |\n")
              f.write("|-------|---------|---------|--------|\n")
              f.write("\n".join(lines) + "\n")
          EOF
          else
            echo "No summary.json produced." >> "$GITHUB_STEP_SUMMARY"
          fi
